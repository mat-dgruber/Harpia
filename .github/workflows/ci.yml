name: Integração Contínua (CI)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-compiler:
    name: Test & Lint Harpia Compiler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'
          cache: true

      - name: Instalar Dependências
        run: go mod download

      - name: Validar Formatação de Código (go fmt)
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Código não formatado com gofmt. Execute 'go fmt ./...' localmente."
            gofmt -d .
            exit 1
          fi

      - name: Executar Análise Estática (go vet)
        run: go vet ./...

      - name: Executar Testes Unitários
        run: go test ./... -v
